services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vaultrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vaultrix
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "apt-get update -qq && apt-get install -y --no-install-recommends openssl &&
             npm install &&
             npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             npx tsx prisma/seed.ts &&
             npm run dev"

  worker:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vaultrix
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "apt-get update -qq && apt-get install -y --no-install-recommends openssl &&
             npm install &&
             npx prisma generate &&
             npx tsx src/worker.ts"
    restart: unless-stopped

volumes:
  postgres_data:
  app_node_modules:
  worker_node_modules:
